<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>像素地牢</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e;touch-action:none}
body{display:flex;flex-direction:column}
#hud{flex-shrink:0;height:46px;background:rgba(6,6,14,0.98);display:flex;align-items:center;justify-content:space-between;padding:0 12px;padding-top:env(safe-area-inset-top,0px);font:bold 11px monospace;color:#c0c0c0;z-index:10;border-bottom:1px solid rgba(255,255,255,0.04);gap:6px}
.hg{display:flex;align-items:center;gap:10px}
.st{display:flex;align-items:center;gap:3px;font-size:10px}
.st i{font-size:12px;font-style:normal}
.st-hp i{color:#ff6b6b}.st-mp i{color:#9b59b6}
.st-gold i{color:#ffe66d}.st-kill i{color:#888}.st-fl i{color:#ffe66d;font-size:13px}
#stage{flex:1;position:relative;overflow:hidden;min-height:0;background:#06060e}
#c{position:absolute;top:50%;left:50%;Image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;touch-action:none}
#bottom-ui{flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
#item-bar{display:flex;height:56px;background:rgba(6,6,14,0.99);border-top:1px solid rgba(255,255,255,0.04);align-items:center;justify-content:center;gap:8px;padding:0 10px}
.is{width:44px;height:44px;background:rgba(18,18,34,0.96);border:2px solid rgba(255,255,255,0.07);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform 80ms;flex-shrink:0;position:relative}
.is:active{transform:scale(0.88);border-color:#ffe66d}
.is.empty{opacity:0.15}
.is .cnt{position:absolute;bottom:1px;right:3px;font:bold 7px monospace;color:#ffe66d;background:rgba(0,0,0,0.7);padding:1px 2px;border-radius:3px;line-height:1}
#skill-bar{display:flex;height:64px;background:rgba(6,6,14,0.99);border-top:1px solid rgba(255,255,255,0.03);align-items:center;justify-content:center;gap:7px;padding:0 8px}
.sb{width:48px;height:48px;background:rgba(18,18,38,0.96);border:2px solid rgba(155,89,182,0.45);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 80ms,opacity 150ms;position:relative;overflow:hidden;flex-shrink:0}
.sb:active:not(.dis){transform:scale(0.88)}
.sb.dis{opacity:0.22;border-color:rgba(80,80,80,0.2)}
.sb .si{font-size:17px;line-height:1}.sb .sl{font-size:7px;color:#777;margin-top:1px;line-height:1}
.sb .smp{position:absolute;top:2px;right:3px;font:bold 7px monospace;color:#9b59b6;line-height:1}
.sb .scd{position:absolute;bottom:0;left:0;right:0;background:rgba(155,89,182,0.55);transition:height 0.1s linear;height:0}
#atkb{width:54px;height:54px;background:rgba(48,8,8,0.96);border:2px solid rgba(192,57,43,0.55);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 80ms;flex-shrink:0;margin-left:5px}
#atkb:active{transform:scale(0.84);background:rgba(110,15,15,0.96)}
#atkb .ai{font-size:18px;line-height:1}.#atkb .al{font-size:7px;color:#ff6b6b;margin-top:1px;line-height:1}
.sdiv{width:1px;height:32px;background:rgba(255,255,255,0.04);margin:0 2px}
#toast{display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);background:rgba(240,184,64,0.97);color:#1a1a2e;font:bold 12px sans-serif;padding:6px 18px;border-radius:20px;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 2px 14px rgba(0,0,0,0.5)}
#dmg{pointer-events:none;display:none;position:fixed;inset:0;z-index:50;box-shadow:inset 0 0 120px rgba(220,40,40,0.75)}
#upg{pointer-events:none;display:none;position:fixed;inset:0;z-index:50;background:rgba(240,184,64,0.22)}
#rw{display:none;position:fixed;inset:0;background:#06060e;z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#c0c0c0;font:bold 17px sans-serif;gap:14px}
#rw i{font-size:52px;font-style:normal;animation:spin 1.5s ease-in-out infinite}#rw span{font-size:12px;opacity:0.38}
@keyframes spin{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
#loading{position:fixed;inset:0;background:#06060e;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c0c0c0;font:14px sans-serif;gap:10px}
.ld{font-size:12px;opacity:0.3}
</style>
</head>

  for(var mi=0;mi<S.monsters.length;mi++){
    var m=S.monsters[mi];
    var fl=m.flash>0&&m.flash%2===0;
    if(fl){
      ctx.fillStyle="#ffffff";
    } else if(SPRITES[m.sp]&&SPRITES[m.sp].width>0){
      drawSprite(m.sp,ctx,m.x,m.y,m.size*2.2);
    } else {
      ctx.fillStyle=m.c;
    }
    if(!fl&&(!SPRITES[m.sp]||SPRITES[m.sp].width===0)){
      ctx.fillRect(m.x-m.size,m.y-m.size,m.size*2,m.size*2);
    }
    if(!fl){
      ctx.fillStyle="#111";ctx.fillRect(m.x-3,m.y-4,2,2);ctx.fillRect(m.x+1,m.y-4,2,2);
    }
    var bw=m.size*2+4,bh=3,bx=m.x-m.size-2,by=m.y-m.size-7;
    ctx.fillStyle="#222";ctx.fillRect(bx,by,bw,bh);
    var pct=m.hp/m.maxHp;
    ctx.fillStyle=pct>0.6?"#4ecdc4":pct>0.3?"#f39c12":"#e74c3c";ctx.fillRect(bx,by,bw*pct,bh);
  }
  // player
  var ps=T*SC;
  if(SPRITES.player&&SPRITES.player.width>0){
    drawSprite("player",ctx,S.px,S.py,ps*1.1);
  } else {
    ctx.fillStyle=COL.player;ctx.fillRect(S.px-ps/2,S.py-ps/2,ps,ps);
    ctx.strokeStyle="rgba(0,0,0,0.25)";ctx.lineWidth=1;ctx.strokeRect(S.px-ps/2,S.py-ps/2,ps,ps);
    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(S.px-ps/2+2,S.py-ps/2+2,ps-4,2);
    ctx.fillStyle="#111";
    if(S.pdir==="down"){ctx.fillRect(S.px-4,S.py-2,3,3);ctx.fillRect(S.px+1,S.py-2,3,3);}
    else if(S.pdir==="left"){ctx.fillRect(S.px-ps/2,S.py-2,3,3);}
    else if(S.pdir==="right"){ctx.fillRect(S.px+ps/2-3,S.py-2,3,3);}
  }
  // target mark
  if(S.targetMark&&S.targetMark.t>0){
    var ma=S.targetMark;
    var alpha=ma.t/50;
    ctx.strokeStyle="rgba(255,230,100,"+(alpha*0.6)+")";
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(ma.x,ma.y,8,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle="rgba(255,230,100,"+(alpha*0.3)+")";
    ctx.beginPath();ctx.arc(ma.x,ma.y,5,0,Math.PI*2);ctx.fill();
  }
  // attack range flash
  if(S.atkCd>ATK_CD-8){
    ctx.strokeStyle="rgba(255,80,80,0.2)";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(S.px,S.py,ATK_R,0,Math.PI*2);ctx.stroke();
  }
}

function loop(){update();render();requestAnimationFrame(loop);}

function startGame(){
  S.px=0;S.py=0;S.pdx=0;S.pdy=0;S.pdir="down";
  S.php=100;S.pmaxHp=100;S.pmp=5;S.pmaxMp=5;S.patk=22;S.pdef=0;S.atkCd=0;
  S.gold=0;S.kills=0;S.floor=1;S.level=1;S.exp=0;S.expNext=10;
  S.skills=[];S.skillCds=[0,0,0];
  S.weapon=null;S.armor=null;
  S.phase="play";
  genFloor();updHUD();updSkillUI();
}

function init(){
  fitCanvas();chkRot();
  var ld=document.getElementById("loading");
  if(ld)ld.style.display="none";
  startGame();loop();
}

var as=document.createElement("style");
as.textContent="@keyframes dmg{0%{opacity:.9}100%{opacity:0}}@keyframes upg{0%{opacity:.25}100%{opacity:0}}";
document.head.appendChild(as);

loadSprites(function(){
  var ld=document.getElementById("loading");
  if(ld)ld.style.display="none";
  init();
});

// fallback: 如果素材加载超过8秒还没全部完成，直接开始
setTimeout(function(){
  var ld=document.getElementById("loading");
  if(ld&&ld.style.display==="none"&&S.phase==="loading"){return;}
  if(ld)ld.style.display="none";
  if(S.phase==="loading")init();
},8000);
</script>
